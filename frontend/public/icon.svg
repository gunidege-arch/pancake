<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8cf8a"/>
      <stop offset="40%" stop-color="#d4a853"/>
      <stop offset="60%" stop-color="#f0deaa"/>
      <stop offset="100%" stop-color="#b8913a"/>
    </linearGradient>
  </defs>

  <!-- Background: pure black rounded rect -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="#0a0a0a"/>

  <!-- Subtle inner border glow -->
  <rect x="8" y="8" width="496" height="496" rx="104" ry="104" fill="none" stroke="rgba(212,168,83,.12)" stroke-width="2"/>

  <!-- "搜" character — gold, centered -->
  <text
    x="256" y="320"
    text-anchor="middle"
    font-family="'PingFang SC','Noto Sans SC','Heiti SC','STHeiti','sans-serif'"
    font-size="290"
    font-weight="700"
    fill="url(#gold)"
    letter-spacing="-10"
  >搜</text>

  <!-- Subtle gold bottom accent line -->
  <rect x="140" y="390" width="232" height="3" rx="1.5" fill="url(#gold)" opacity=".3"/>
</svg>
