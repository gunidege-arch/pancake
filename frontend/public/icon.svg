<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="512" height="512" rx="120" ry="120" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect x="4" y="4" width="504" height="504" rx="116" ry="116" fill="none" stroke="rgba(129,140,248,.08)" stroke-width="2"/>

  <!-- Magnifying glass — geometric, thick stroke -->
  <circle cx="210" cy="210" r="100" fill="none" stroke="url(#accent)" stroke-width="28" stroke-linecap="round"/>

  <!-- Handle — clean angled line -->
  <line x1="288" y1="288" x2="380" y2="380" stroke="url(#accent)" stroke-width="28" stroke-linecap="round"/>
</svg>
