<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a28"/>
      <stop offset="100%" stop-color="#0d0d18"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0e6ff"/>
      <stop offset="40%" stop-color="#d4b8f0"/>
      <stop offset="100%" stop-color="#a080d0"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb7299"/>
      <stop offset="100%" stop-color="#c94d8c"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#bg)" stroke="#2a2a3a" stroke-width="3"/>

  <!-- Subtle search beam -->
  <circle cx="280" cy="220" r="130" fill="none" stroke="rgba(251,114,153,.08)" stroke-width="40" transform="rotate(-15 280 220)"/>
  <circle cx="280" cy="220" r="80" fill="none" stroke="rgba(251,114,153,.12)" stroke-width="3" transform="rotate(-15 280 220)"/>

  <!-- Small sparkle dots -->
  <circle cx="130" cy="140" r="3" fill="rgba(255,255,255,.25)"/>
  <circle cx="380" cy="120" r="2.5" fill="rgba(255,255,255,.2)"/>
  <circle cx="350" cy="380" r="2" fill="rgba(255,255,255,.15)"/>
  <circle cx="140" cy="360" r="2.5" fill="rgba(255,255,255,.18)"/>

  <!-- "搜" character -->
  <text x="256" y="310" text-anchor="middle" font-family="'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif" font-size="260" font-weight="700" fill="url(#textGrad)" filter="url(#glow)">搜</text>

  <!-- Bottom accent line -->
  <rect x="170" y="370" width="172" height="4" rx="2" fill="url(#accentGrad)" opacity=".7"/>

  <!-- Small magnifying glass accent -->
  <g transform="translate(350, 130)" opacity=".35">
    <circle cx="16" cy="16" r="11" fill="none" stroke="url(#accentGrad)" stroke-width="5"/>
    <line x1="24" y1="24" x2="36" y2="36" stroke="url(#accentGrad)" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>
